<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Snake Pro — Ultimate Professional Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@500;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="style.css" />
</head>
<body data-theme="dark">
  <div class="background-overlay"></div>
  
  <div class="game-wrapper">
    <div class="game-container">
      <header class="app-header">
        <div class="brand">
          <h1>SNAKE <span>PRO</span></h1>
        </div>
        <div class="header-actions">
          <div class="quick-action-bar desktop-only">
            <button id="quickPlayBtn" class="action-btn" title="Play/Pause">▶️</button>
            <button id="quickShopBtn" class="action-btn" title="Shop">🛒</button>
            <button id="quickSettingsBtn" class="action-btn" title="Settings">⚙️</button>
          </div>
          <div class="mobile-only header-mobile-btns">
            <button id="mobilePlayBtn" class="icon-btn" aria-label="Play">▶️</button>
            <button id="shopBtn" class="icon-btn" aria-label="Shop">🛒</button>
            <button id="settingsBtn" class="icon-btn" aria-label="Settings">⚙️</button>
          </div>
          <div class="theme-select-wrapper">
            <span class="theme-icon">🎨</span>
            <select id="themeSelect">
              <option value="dark">Dark</option>
              <option value="neon">Neon</option>
              <option value="retro">Retro</option>
            </select>
          </div>
        </div>
      </header>

      <div class="main-layout">
        <div class="game-surface">
          <div id="game-board" class="board-canvas" aria-label="Game board"></div>
          
          <div id="start-overlay" class="game-overlay">
            <div class="overlay-content">
              <h2 class="glow-text">READY?</h2>
              <p class="desktop-only text-hint">Press <span>[SPACE]</span> or click Start</p>
              <p class="mobile-only text-hint">Swipe board to start</p>
              <button id="start-button" class="btn btn-primary">START GAME</button>
            </div>
          </div>

          <div id="pause-overlay" class="game-overlay hidden">
            <div class="overlay-content">
              <h2>PAUSED</h2>
              <button id="pause-button" class="btn btn-secondary">RESUME</button>
            </div>
          </div>
        </div>

        <aside class="sidebar desktop-only">
          <div class="sidebar-card">
            <span class="label">SCORE</span>
            <span id="sideScore" class="value">0</span>
          </div>
          <div class="sidebar-card">
            <span class="label">COINS</span>
            <span id="sideCoinCount" class="value">0</span>
          </div>
          <div class="sidebar-card">
            <span class="label">TIME</span>
            <span id="sideTime" class="value">0</span>
          </div>
          <div class="sidebar-card">
            <span class="label">BEST</span>
            <span id="sideHighScore" class="value">0</span>
          </div>
        </aside>
      </div>

      <div class="hud mobile-only">
        <div class="hud-item score-card">
          <span class="label">SCORE</span>
          <span id="score" class="value">0</span>
        </div>
        <div class="hud-item coin-card">
          <span class="label">COINS</span>
          <span id="coinCount" class="value">0</span>
        </div>
        <div class="hud-item time-card">
          <span class="label">TIME</span>
          <span id="time" class="value">0</span>
        </div>
        <div class="hud-item high-card">
          <span class="label">BEST</span>
          <span id="highScore" class="value">0</span>
        </div>
      </div>

      <div class="footer-controls">
        <p class="control-hint desktop-only">Use Arrows to Navigate</p>
        <p class="control-hint mobile-only">Swipe to Change Direction</p>
      </div>
    </div>
  </div>

  <!-- Game Over Modal -->
  <div id="modalOverlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal glass">
      <div class="modal-header">
        <h2 class="danger-text">GAME OVER</h2>
      </div>
      <div class="modal-body">
        <div class="stat">
          <span class="label">Your Score</span>
          <span id="finalScore" class="value">0</span>
        </div>
        <div class="stat">
          <span class="label">Best Score</span>
          <span id="finalHigh" class="value">0</span>
        </div>
      </div>
      <div class="modal-actions">
        <button id="restartBtn" class="btn btn-primary">PLAY AGAIN</button>
        <button id="closeBtn" class="btn btn-ghost">EXIT</button>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settingsOverlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal glass settings-modal">
      <div class="modal-header">
        <h2>SETTINGS</h2>
      </div>
      <div class="modal-body settings-grid">
        <div class="setting-item">
          <span class="setting-label">Sound FX</span>
          <label class="switch">
            <input type="checkbox" id="soundToggle" checked>
            <span class="slider round"></span>
          </label>
        </div>
        <div class="setting-item">
          <span class="setting-label">Vibration</span>
          <label class="switch">
            <input type="checkbox" id="vibrationToggle" checked>
            <span class="slider round"></span>
          </label>
        </div>
        <div class="setting-item">
          <span class="setting-label">Difficulty</span>
          <div class="difficulty-select-wrapper">
            <select id="difficultySelect">
              <option value="easy">Easy</option>
              <option value="medium" selected>Medium</option>
              <option value="hard">Hard</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-actions">
        <button id="saveSettingsBtn" class="btn btn-primary">SAVE & CLOSE</button>
      </div>
    </div>
  </div>
  <!-- Shop Modal -->
  <div id="shopOverlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal glass shop-modal">
      <div class="modal-header">
        <h2>SNAKE SHOP</h2>
        <div class="shop-coins">
          <span>💰</span> <span id="shopCoinCount">0</span>
        </div>
      </div>
      <div class="modal-body skin-gallery" id="skinGallery">
        <!-- Skins will be rendered here by JS -->
      </div>
      <div class="modal-actions">
        <button id="closeShopBtn" class="btn btn-primary">CLOSE</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
